<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!--
    SENTINEL favicon — cyan/violet gradient orb with a scan ring,
    matching the on-page character. Renders at 16 / 32 / 48 / etc.
    Uses inline gradients so no external stylesheet is required.
  -->
  <defs>
    <radialGradient id="body" cx="45%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#a5f3fc" stop-opacity="1"/>
      <stop offset="45%"  stop-color="#6ee7f9" stop-opacity="0.95"/>
      <stop offset="85%"  stop-color="#a78bfa" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3b3b5a" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#eef0f6" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#a5f3fc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a5f3fc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="16" x2="32" y2="16">
      <stop offset="0%"   stop-color="#6ee7f9" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#6ee7f9" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Dark backdrop matches --bg (#06060b) so the icon reads on light OS chromes too. -->
  <rect width="32" height="32" fill="#06060b" rx="4"/>
  <!-- SENTINEL body -->
  <circle cx="16" cy="16" r="10" fill="url(#body)"/>
  <!-- Bright core -->
  <circle cx="16" cy="16" r="3.5" fill="url(#core)"/>
  <!-- Scan ring — tilted ellipse -->
  <ellipse cx="16" cy="16" rx="12" ry="3.5" fill="none" stroke="url(#ring)" stroke-width="1.2" transform="rotate(-18 16 16)"/>
</svg>
